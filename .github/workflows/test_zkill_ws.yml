name: Test zKillboard WebSocket

on:
  workflow_dispatch:

jobs:
  websocket-test:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install ws

      - name: Run websocket test
        run: node scripts/test_zkill_ws.js
